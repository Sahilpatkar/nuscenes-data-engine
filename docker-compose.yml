# Local infra stack for the nuScenes data engine.
#
# RUN THIS ON YOUR LOCAL INFRA MACHINE, *not* the GPU server. The GPU server runs compute
# only (ingest/train/evaluate) and writes plain files that you rsync here; this stack
# (MinIO + MLflow, later the serving API + Streamlit UI) is the ops layer around them.
#
# Bring up the data-infra layer:  docker compose up -d minio minio-setup mlflow
# Bring up serving (Phase 4):     docker compose up -d api streamlit

services:
  # S3-compatible object store — DVC remote + MLflow artifact store.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: create the bucket DVC/MLflow will use.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-nuscenes-data-engine};
      echo 'bucket ready';
      "

  # Experiment tracking + model registry (Phase 2–3).
  # TODO(Phase 2): back the artifact store with the MinIO bucket above.
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination s3://${MINIO_BUCKET:-nuscenes-data-engine}/mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "5001:5000"  # host 5001: macOS AirPlay Receiver squats on 5000
    volumes:
      - mlflow-data:/mlflow
    depends_on:
      - minio

  # [infra machine] Phase 6e: Neo4j knowledge graph — context/relationship graph built
  # from the processed Parquet + LanceDB store. Browser/Bloom on 7474, Bolt on 7687.
  # APOC + Graph Data Science plugins power the active-learning community-detection arm.
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/neo4jpassword}
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: gds.*,apoc.*
      NEO4J_server_memory_heap_max__size: 2G
    ports:
      - "7474:7474"   # HTTP: Neo4j Browser / Bloom
      - "7687:7687"   # Bolt: driver protocol
    volumes:
      - neo4j-data:/data
      - neo4j-plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # [infra machine] Phase 4: FastAPI serving the production model from the synced
  # mlruns/ registry (or a raw checkpoint via SERVING_WEIGHTS).
  api:
    build:
      context: .
      dockerfile: docker/serving.Dockerfile
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-sqlite:///mlruns/mlflow.db}
      SERVING_DEVICE: ${SERVING_DEVICE:-cpu}
      SERVING_WEIGHTS: ${SERVING_WEIGHTS:-}
      # Phase 6c dataset chat: default = Ollama on the host Mac; flip to
      # CHAT_PROVIDER=anthropic (+ ANTHROPIC_API_KEY) for a keyed deployment.
      CHAT_PROVIDER: ${CHAT_PROVIDER:-local}
      CHAT_BASE_URL: ${CHAT_BASE_URL:-http://host.docker.internal:11434/v1}
      CHAT_MODEL: ${CHAT_MODEL:-qwen2.5:14b}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Phase 6e knowledge graph: reach the neo4j service over the compose network.
      # Chat adds a run_cypher tool when reachable, and degrades to SQL-only if not.
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
    volumes:
      - ./mlruns:/app/mlruns  # rw: sqlite needs journal writes even for reads
      - ./weights:/app/weights:ro  # lets SERVING_WEIGHTS=weights/<x>.pt work in-container
      - ./data/monitoring:/app/data/monitoring  # drift-capture JSONL persists on the host
      - ./data/lancedb:/app/data/lancedb:ro  # frame-embedding store for /search
      - ./data/processed:/app/data/processed:ro  # Parquet tables for /chat text-to-SQL
      - ./data/autolabel:/app/data/autolabel:ro  # VLM labels view for /chat
      - ./data/chat:/app/data/chat  # agent query log persists on the host
      - ./.cache:/app/.cache  # HF model cache: avoid re-downloading SigLIP per restart
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
      - neo4j

  # [infra machine] Phase 4: demo UI — an HTTP client of the api service.
  streamlit:
    build:
      context: .
      dockerfile: docker/serving.Dockerfile
    command:
      ["streamlit", "run", "app/streamlit_app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  minio-data:
  mlflow-data:
  neo4j-data:
  neo4j-plugins:
