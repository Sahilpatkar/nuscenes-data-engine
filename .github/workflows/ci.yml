name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      # data extra so the ingestion/training/evaluation/validation unit tests run;
      # train/serve extras (torch) stay out — their tests skip via importorskip.
      - name: Install deps (base + dev + data)
        run: uv sync --extra dev --extra data

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy

      - name: Tests (pytest)
        run: uv run pytest

  # TODO(Phase 5): add a smoke-test training run on a tiny data slice.
