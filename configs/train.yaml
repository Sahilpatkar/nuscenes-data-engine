# Phase 2 — training config (Ultralytics YOLO fine-tuning).
# Every run must be reproducible from (this config + a data version hash).

model:
  weights: yolov8n.pt        # pretrained checkpoint to fine-tune
  imgsz: 640
  classes:                   # subset of nuScenes categories mapped to 2D detector
    - car
    - truck
    - bus
    - pedestrian
    - bicycle

train:
  epochs: 50
  batch: 16
  lr0: 0.01
  optimizer: auto
  seed: 42
  augment:
    hsv_h: 0.015
    hsv_s: 0.7
    hsv_v: 0.4
    fliplr: 0.5
    mosaic: 1.0

data:
  processed_dir: ./data/processed
  yolo_dir: ./data/processed/yolo   # generated YOLO-format dataset
  val_split: val                    # nuScenes official val scenes

tracking:
  experiment_name: nuscenes-yolo
  # Local file store: training on the GPU server needs no MLflow server. Sync ./mlruns to
  # the infra machine (its MLflow server owns the UI + registry), or override via
  # MLFLOW_TRACKING_URI=http://<infra-host>:5000.
  mlflow_tracking_uri: file:./mlruns
