# Phase 1 — ingestion / projection config.
# Values here are read by src/nuscenes_data_engine/ingestion (TODO: wire up).

source:
  dataroot: /data/ggare/datasets/nuscenes   # overridden by NUSCENES_DATAROOT
  version: v1.0-trainval

# Cameras to project 3D boxes into (all 6 surround-view cameras).
cameras:
  - CAM_FRONT
  - CAM_FRONT_LEFT
  - CAM_FRONT_RIGHT
  - CAM_BACK
  - CAM_BACK_LEFT
  - CAM_BACK_RIGHT

# 2D projection settings.
projection:
  visibility_min: 2        # nuScenes visibility token floor (1..4)
  min_box_area_px: 20      # drop sub-pixel noise but keep small/distant objects (recall)
  clip_to_image: true      # intersect projected boxes with the image canvas

output:
  processed_dir: ./data/processed
  parquet:
    annotations: annotations.parquet   # one row per projected 2D box
    samples: samples.parquet           # per-keyframe context (scene, weather, sensor)
